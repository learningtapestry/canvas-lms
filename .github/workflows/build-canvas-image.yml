name: Build Canvas image

# Manual, deliberate builds — pushes the production Canvas image to Artifact
# Registry. Auth is keyless via Workload Identity Federation (no stored keys).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/sha) to build"
        required: true
        default: cloud66-prod
      tag:
        description: "Image tag to push"
        required: true
        default: staging

permissions:
  contents: read
  id-token: write # required for the WIF OIDC token

env:
  IMAGE: us-central1-docker.pkg.dev/propane-country-501515-c2/canvas/canvas-lms
  WIF_PROVIDER: projects/471927261241/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: github-actions@propane-country-501515-c2.iam.gserviceaccount.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Build the running production code (cloud66-prod), not the branch the
      # workflow was dispatched from.
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # Canvas' asset build is disk-hungry; reclaim ~10-15 GB on the runner.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h /

      # The `instructure/xsslint` GitHub repo (a dev-only XSS linter pinned in
      # package.json) has been removed, so `yarn install --frozen-lockfile`
      # 404s. It's not used by asset compilation or runtime — drop it from the
      # build's copy so the lockfile stays consistent.
      - name: Strip dead dev-only dependency (xsslint)
        run: |
          jq 'del(.devDependencies.xsslint)' package.json > package.json.tmp && mv package.json.tmp package.json
          awk '/^xsslint@instructure\/xsslint#babel7:/{skip=1} skip && /^$/{skip=0; next} skip{next} {print}' yarn.lock > yarn.lock.tmp && mv yarn.lock.tmp yarn.lock
          echo "xsslint refs remaining: $(grep -c xsslint package.json yarn.lock | paste -sd+ - | bc 2>/dev/null || echo 0)"

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production # maintained in the repo, no generation needed
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.tag }}
          build-args: |
            POSTGRES_CLIENT=17
          provenance: false
