# external-secrets Helm values (staging) — chart external-secrets/external-secrets 2.7.0
# Reproduces the live release. See README.md in this dir for install commands.
#
# Same rationale as cert-manager: low BURSTABLE requests so Autopilot bills the
# small request instead of its 0.5 vCPU / 2Gi default. Cuts ~$70 -> ~$6/mo.
installCRDs: true

# Workload Identity: impersonate the least-privilege GSA (Secret Manager
# accessor). KSA -> GSA binding is created by Terraform (module.external_secrets_sa).
serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: canvas-external-secrets@propane-country-501515-c2.iam.gserviceaccount.com

resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits: { cpu: 500m, memory: 512Mi }

webhook:
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

certController:
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
