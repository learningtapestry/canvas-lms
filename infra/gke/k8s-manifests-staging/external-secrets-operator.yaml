---
# 1. Namespace for External Secrets Operator
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets

---
# 2. ServiceAccount bound to the canvas-external-secrets GSA via Workload
#    Identity (roles/secretmanager.secretAccessor on the canvas secret).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: canvas-external-secrets@propane-country-501515-c2.iam.gserviceaccount.com

---
# 3. ClusterSecretStore — GCP Secret Manager provider.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: propane-country-501515-c2
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: canvas-gke
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# 4. Pull the assembled canvas secret into the `canvas-secrets` k8s Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canvas-secret
  namespace: canvas-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: canvas-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: canvas-secrets-staging
