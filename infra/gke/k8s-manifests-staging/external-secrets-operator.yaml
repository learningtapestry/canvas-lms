# External Secrets Operator is installed via Helm (its namespace + service
# account are chart-managed and Workload-Identity annotated). This file only
# declares the store and the sync into the app namespace.
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: propane-country-501515-c2
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: canvas-gke
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# Pulls the assembled secret (POSTGRESQL_ADDRESS/PASSWORD, REDIS_ADDRESS,
# ENCRYPTION_KEY, JWT_ENCRYPTION_KEY) into the `canvas-secrets` k8s Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canvas-secret
  namespace: canvas-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: canvas-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: canvas-secrets-staging
