apiVersion: v1
kind: ServiceAccount
metadata:
  name: canvas-app
  namespace: canvas-staging
  annotations:
    # Workload Identity → canvas-app GSA (Cloud SQL client, GCS object admin,
    # Secret Manager accessor). Replace PROJECT_ID.
    iam.gke.io/gcp-service-account: canvas-app@PROJECT_ID.iam.gserviceaccount.com
