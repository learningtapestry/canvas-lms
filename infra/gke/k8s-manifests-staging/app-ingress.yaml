apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canvas-web-ingress
  namespace: canvas-staging
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Canvas allows very large uploads (image sets NGINX_MAX_UPLOAD_SIZE=10g).
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - canvas-staging.example.com
      secretName: canvas-staging-tls
  rules:
    - host: canvas-staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: canvas-web
                port:
                  number: 80
