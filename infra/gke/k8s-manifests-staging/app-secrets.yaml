# Reference only — DO NOT apply. The `canvas-secrets` Secret is created and
# populated by External Secrets Operator from GCP Secret Manager
# (secret `canvas-secrets-staging`, assembled by Terraform). Keys (env vars
# consumed by the cloud66 config templates):
#
#   POSTGRESQL_ADDRESS   -> database.yml.cloud66 (Cloud SQL private IP)
#   POSTGRESQL_PASSWORD  -> database.yml.cloud66
#   REDIS_ADDRESS        -> redis.yml.cloud66 (Memorystore host; AUTH disabled)
#   ENCRYPTION_KEY       -> security.yml.cloud66
#   JWT_ENCRYPTION_KEY   -> security.yml.cloud66
#
# Non-secret env (DB name/user/port, REDIS_PORT, CANVAS_DOMAIN, admin email,
# file storage path) is in the canvas-env ConfigMap.
