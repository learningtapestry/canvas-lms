# Reference only — DO NOT apply. The `canvas-secrets` Secret is created and
# populated by External Secrets Operator from GCP Secret Manager
# (see external-secrets-operator.yaml). Keys it provides (as env vars):
#
#   DB_HOST, DB_NAME, DB_USERNAME, DB_PASSWORD   -> database.yml
#   ENCRYPTION_KEY                               -> security.yml
#   REDIS_URL                                    -> redis.yml / cache_store.yml
#   GCS_BUCKET, GCS_HMAC_ACCESS_KEY,
#   GCS_HMAC_SECRET_KEY, GCS_S3_INTEROP_REGION   -> amazon_s3.yml
#
# All are generated/assembled by Terraform (environments/staging) and stored in
# the Secret Manager secret `canvas-secrets-staging`.
