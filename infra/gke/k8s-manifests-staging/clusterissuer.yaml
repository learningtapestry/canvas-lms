apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: REPLACE_ME@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # DNS01 via Google Cloud DNS. cert-manager authenticates with Workload
      # Identity — annotate its ServiceAccount with the canvas-cert-manager GSA
      # (roles/dns.admin).
      - dns01:
          cloudDNS:
            project: PROJECT_ID
