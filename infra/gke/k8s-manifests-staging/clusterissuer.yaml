# Let's Encrypt ACME issuers. HTTP-01 (via ingress-nginx), NOT DNS-01: the domain's
# DNS is hosted at GoDaddy, not Cloud DNS, so a Cloud DNS solver can't create the
# challenge records. HTTP-01 validates over port 80 through the ingress and needs
# no DNS-provider API access — just the A record pointing at the LB.
#
# Use letsencrypt-staging to dry-run issuance (untrusted cert, generous rate
# limits), then switch the ingress annotation to letsencrypt-prod for the real one.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: honora@thedtri.org
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: honora@thedtri.org
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
