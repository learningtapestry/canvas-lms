apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: canvas-web-hpa
  namespace: canvas-staging
  labels:
    app: canvas-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: canvas-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
