apiVersion: apps/v1
kind: Deployment
metadata:
  name: canvas-jobs
  namespace: canvas-staging
  labels:
    app: canvas-jobs
spec:
  # inst-jobs (delayed_job). `run` is a single foreground worker per pod;
  # scale by replicas. 2 replicas so job processing survives a pod loss.
  replicas: 2
  selector:
    matchLabels:
      app: canvas-jobs
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: canvas-jobs
    spec:
      serviceAccountName: canvas-app
      containers:
        - name: canvas-jobs
          image: us-central1-docker.pkg.dev/PROJECT_ID/canvas/canvas-lms:staging
          imagePullPolicy: Always
          command: ["bundle", "exec", "script/delayed_job", "run"]
          envFrom:
            - configMapRef:
                name: canvas-env
            - secretRef:
                name: canvas-secrets
          livenessProbe:
            exec:
              command: ["/bin/bash", "-lc", "pgrep -f delayed_job >/dev/null"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - { name: config, mountPath: /usr/src/app/config/database.yml, subPath: database.yml }
            - { name: config, mountPath: /usr/src/app/config/redis.yml, subPath: redis.yml }
            - { name: config, mountPath: /usr/src/app/config/cache_store.yml, subPath: cache_store.yml }
            - { name: config, mountPath: /usr/src/app/config/security.yml, subPath: security.yml }
            - { name: config, mountPath: /usr/src/app/config/amazon_s3.yml, subPath: amazon_s3.yml }
            - { name: config, mountPath: /usr/src/app/config/file_store.yml, subPath: file_store.yml }
            - { name: config, mountPath: /usr/src/app/config/domain.yml, subPath: domain.yml }
            - { name: config, mountPath: /usr/src/app/config/outgoing_mail.yml, subPath: outgoing_mail.yml }
      volumes:
        - name: config
          configMap:
            name: canvas-config-files
